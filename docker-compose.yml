services:
  web:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: bulistio-web
    depends_on:
      db:
        condition: service_healthy
    command:
      - /bin/sh
      - -lc
      - /usr/local/bin/app-entrypoint && exec supervisord
    environment:
      TZ: Europe/Kiev
      WEB_DOCUMENT_INDEX: index.php
      WEB_DOCUMENT_ROOT: /app/public
    ports:
      - "8080:80"
    restart: unless-stopped
    volumes:
      - ./app:/app

  db:
    image: mariadb:10.11
    container_name: bulistio-db
    environment:
      MARIADB_DATABASE: bulistio
      MARIADB_PASSWORD: bulistio
      MARIADB_ROOT_PASSWORD: root
      MARIADB_USER: bulistio
      TZ: Europe/Kiev
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    ports:
      - "3307:3306"
    restart: unless-stopped
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
